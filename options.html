<!DOCTYPE html>
<html>
<head>
  <title>Ticket AI Copilot - Options</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 400px;
    }
    input {
      padding: 8px;
      font-size: 14px;
    }
    button {
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    #status {
      margin-top: 10px;
      color: green;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Settings</h2>
    <label for="apiKey">Gemini API Key:</label>
    <input type="password" id="apiKey" placeholder="Enter your Gemini API key" />
    <button id="saveBtn">Save</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
